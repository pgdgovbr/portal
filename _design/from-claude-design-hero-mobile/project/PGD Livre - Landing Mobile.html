<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FCFBF8" />
  <title>PGD Livre — Mobile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="landing-tokens.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #FCFBF8; }
    body {
      font-family: "Public Sans", system-ui, sans-serif;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    #root { width: 100%; }

    /* Garante que imagens não estouram a viewport */
    img { max-width: 100%; height: auto; }

    /* Em telas mais largas (tablet/desktop), centraliza a página móvel em uma "moldura"
       sutil — para visualização. No celular ocupa 100% sem moldura. */
    @media (min-width: 720px) {
      body {
        background:
          radial-gradient(1200px 600px at 50% -100px, rgba(11,20,38,0.06), transparent 60%),
          #F4F2EC;
        padding: 32px 0;
      }
      #root > .lp {
        box-shadow:
          0 30px 70px -30px rgba(11, 20, 38, 0.25),
          0 0 0 1px rgba(11, 20, 38, 0.06);
        border-radius: 18px;
        overflow: hidden;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Logo da landing -->
  <script type="text/babel" src="landing-logo.jsx"></script>

  <!-- Página mobile (renderiza no #root) -->
  <script type="text/babel" src="landing-mobile-page.jsx"></script>
</body>
</html>
