name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'infra/**'
      - '_plan/**'
      - '**.md'

permissions:
  contents: read
  id-token: write   # OIDC para Workload Identity Federation

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker southamerica-east1-docker.pkg.dev

      - name: Build & push image
        run: |
          IMAGE=southamerica-east1-docker.pkg.dev/inspire-7-finep/pgd-portal/app:${{ github.sha }}
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy Cloud Run
        run: |
          gcloud run services update pgd-portal \
            --image="$IMAGE" \
            --region=southamerica-east1 \
            --project=inspire-7-finep
        # Env vars do Cloud Run são geridas pelo Terraform;
        # este step só atualiza a imagem.
